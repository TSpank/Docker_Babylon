		var iOS_request = false;
		function getRotations() {
			if (iOS_request == false){
				try{
					const URL = 'https://mojo.r7d.xyz:5005';//'http://127.0.0.1:5000';
					if (loopcounter >= 0)
					{
						loopcounter = 0;
						fetch(URL)
						.then(res => res.text())
						.then(function(text) {
							// ul.innerHTML = text;
							rotationValues = text;
						})
						.catch();
						// .catch(err => console.log(err));	
					} else
					{
						loopcounter +=1;
					}
				} catch {

				}
			}
		}

	</script>

		websocket.onopen = function() {

			ws_open = true;
		}
		websocket.onmessage = function(event) {
			// ul.innerHTML = event.data;
			rotationValues = event.data;
			console.log();
		}
		function requestRotations(request)
		{
			if( ws_open == true )
			{
				websocket.send(request);
			} 
		}
	</script>

		function direction(v1,v2)
		{
			return new BABYLON.Vector3(v2.x-v1.x,v2.y-v1.y,v2.z-v1.z);
		}

		function distance(v1,v2)
		{
			dx = v2.x-v1.x;
			dy = v2.y-v1.y;
			dz = v2.z-v1.z;	
			return Math.sqrt(dx*dx + dy*dy+ dz*dz);
		}

		window.initFunction = async function() {
