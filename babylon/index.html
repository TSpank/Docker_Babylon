		function UpdateCameraZoom(zoom)
		{
			if (zoom != null )
			{
				camera_zoom = zoom;				
			}
			orthoScale = 1000*camera_zoom;
			orthoTop = engine.getRenderHeight() / orthoScale;
			orthoBottom = -engine.getRenderHeight() / orthoScale;
			orthoLeft = -engine.getRenderWidth() / orthoScale;
			orthoRight = engine.getRenderWidth() / orthoScale;
			// Orthographic camera update
			camera_dynamic.orthoTop = orthoTop;
			camera_dynamic.orthoBottom = orthoBottom;
			camera_dynamic.orthoLeft = orthoLeft;
			camera_dynamic.orthoRight = orthoRight;
			camera_dummy.orthoTop = orthoTop;
			camera_dummy.orthoBottom = orthoBottom;
			camera_dummy.orthoLeft = orthoLeft;
			camera_dummy.orthoRight = orthoRight;
			// Perspective Camera Update
			camera_dummy.position.z = -2.0/camera_zoom;
			camera_dynamic.position.z = -2.0/camera_zoom;
			console.log("Zoom Updated:",camera_zoom);
		}

		function direction(v1,v2)
		{

		}

		function distance(v1,v2)
		{
			dx = v2.x-v1.x;
			dy = v2.y-v1.y;
			dz = v2.z-v1.z;	
			return Math.sqrt(dx*dx + dy*dy+ dz*dz);
		}
