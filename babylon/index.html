        function vectorChange( vec, vec2)
		{
			return Math.abs(Math.sqrt(vec.x*vec.x + vec.y*vec.y + vec.z*vec.z)-Math.sqrt(vec2.x*vec2.x + vec2.y*vec2.y + vec2.z*vec2.z));
		}
		function limitangleRight(a)
		{
			if (a>Math.PI/2.0)
			{
				return -(Math.PI-a);
			}
			else if (a<-Math.PI/2.0) 
			{
				return (-Math.PI-a);
			}   
			else
			{
				return a;
			}
		}

		function limitangleLeft(a)
		{
			if (a>Math.PI/2.0)
			{
				return -(Math.PI-a);
			}
			else if (a<-Math.PI/2.0) 
			{
				return (-Math.PI-a);
			}   
			else
			{
				return a;
			}
		}

        function limitangleLeft(a)
		{
			if (a>Math.PI/2.0)
			{
				return -(Math.PI-a);
			}
			else if (a<-Math.PI/2.0) 
			{
				return (-Math.PI-a);
			}   
			else
			{
				return a;
			}
		}

        var pitch_limit = 1.256;
        var roll_limit = 0.8;
        var yaw_limit = 1.134;

        function limitangle(a,limit)
		{
			if (a>limit)
			{
				return limit;
			}
			else if (a<-limit) 
			{
				return -limit
			}   
			else
			{
				return a;
			}
		}

        function fix_theta_3(val)
        {
            //return limitangleLeft(val);
            if (val > Math.PI/2.0){
                return val - Math.PI;
            } 
            else if (val < -Math.PI/2.0)
            {
                return val + Math.PI;
            } else
            {
                return val;
            }
        }

        function sanitise(a)
        {
            rtn = a;
            if (a < -Math.PI/2.0)
            {
                rtn = a+2*Math.pi;
            }
            return -rtn+Math.pi;
            //return -a;
        }

        function limit(a)
        {
            if ( a < -Math.PI )
            {
                return a + 2*Math.PI;
            }
            if ( a > Math.PI )
            {
                return a - 2*Math.PI;
            }
            return a;
        }
