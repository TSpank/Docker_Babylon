<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />

        <title>Babylon.js sample code</title>

        <!-- Babylon.js -->
        <script src="https://preview.babylonjs.com/babylon.js"></script>
        <!-- <script src="https://preview.babylonjs.com/materialslibrary/babylonjs.materials.min.js"></script> -->
        <!-- <script src="https://preview.babylonjs.com/postprocesseslibrary/babylonjs.postprocess.min.js"></script> -->
        <script src="https://preview.babylonjs.com/loaders/babylonjs.loaders.js"></script>
        <script src="https://preview.babylonjs.com/serializers/babylonjs.serializers.min.js"></script>
        <script src="https://preview.babylonjs.com/gui/babylon.gui.min.js"></script>
        <style>
            html, body {
                overflow: hidden;
                width: 100%;
                height: 100%;
                margin: 0;
                padding: 0;
            }

            #renderCanvas {
                width: 100%;
                height: 100%;
                touch-action: none;
            }
        </style>
    </head>
<body>
    <canvas id="renderCanvas"></canvas>
    <script>
        var canvas = document.getElementById("renderCanvas");
        var engine = null;
        var scene = null;
        var sceneToRender = null;
        var createDefaultEngine = function() { return new BABYLON.Engine(canvas, true, { preserveDrawingBuffer: true, stencil: true,  disableWebGL2Support: true}); };
        var rotationValues = "{\"theta_torso_pitch_r\": \"0.0\", \"theta_torso_bend_r\": \"0.0\", \"theta_torso_yaw_r\": \"0.0\", \"theta_torso_roll_r\": \"0.0\", \"theta_torso_tilt_r\": \"0.0\", \"theta_head_pitch_h\": \"0.0\", \"theta_head_yaw_h\": \"0.0\", \"theta_head_roll_h\": \"0.0\", \"theta_armright_upper_alpha\": \"0.0\", \"theta_armright_upper_beta\": \"0.0\", \"theta_armright_upper_gamma\": \"0.0\", \"theta_armright_lower_alpha\": \"0.0\", \"theta_armright_lower_beta\": \"0.0\", \"theta_armright_lower_gamma\": \"0.0\", \"theta_armright_elbow\": \"0.0\", \"theta_armleft_upper_alpha\": \"0.0\", \"theta_armleft_upper_beta\": \"0.0\", \"theta_armleft_upper_gamma\": \"0.0\", \"theta_armleft_lower_alpha\": \"0.0\", \"theta_armleft_lower_beta\": \"0.0\", \"theta_armleft_lower_gamma\": \"0.0\", \"theta_armleft_elbow\": \"0.0\", \"zoom\" : \"0\" }";  


        function vectorChange( vec, vec2)
        {
            return Math.abs(Math.sqrt(vec.x*vec.x + vec.y*vec.y + vec.z*vec.z)-Math.sqrt(vec2.x*vec2.x + vec2.y*vec2.y + vec2.z*vec2.z));
        }
        function limitangleRight(a)
        {
            if (a>Math.PI/2.0)
            {
                return -(Math.PI-a);
            }
            else if (a<-Math.PI/2.0)
            {
                return (-Math.PI-a);
            }
            else
            {
                return a;
            }
        }

        function limitangleLeft(a)
        {
            if (a>Math.PI/2.0)
            {
                return -(Math.PI-a);
            }
            else if (a<-Math.PI/2.0)
            {
                return (-Math.PI-a);
            }
            else
            {
                return a;
            }
        }

        function fix_theta_3(val)
        {
            //return limitangleLeft(val);
            if (val > Math.PI/2.0){
                return val - Math.PI;
            }
            else if (val < -Math.PI/2.0)
            {
                return val + Math.PI;
            } else
            {
                return val;
            }
        }

        function sanitise(a)
        {
            rtn = a;
            if (a < -Math.PI/2.0)
            {
                rtn = a+2*Math.pi;
            }
            return -rtn+Math.pi;
            //return -a;
        }

        function limit(a)
        {
            if ( a < -Math.PI )
            {
                return a + 2*Math.PI;
            }
            if ( a > Math.PI )
            {
                return a - 2*Math.PI;
            }
            return a;
        }

        function MapAxis( value, in_lim, out_lim)
        {
            if ( value > 0.0 )
            {
                in_max = in_lim[1];
                out_max = out_lim[1];
            } else {
                in_max = Math.abs(in_lim[0]);
                out_max = Math.abs(out_lim[0]);
            }
            var ratio = 7.0 / in_max;
            var out = 2.0/ ( 1. + Math.pow(Math.E, - (ratio*value))) - 1.0;
            return out*out_max
        }

        // Neck Movement
        var pitch_neck_limit = [-0.576, 0.837];
        var roll_neck_limit = [-0.576, 0.576];
        var yaw_neck_limit = [-0.471,0.471];

        // Head/Atlas Movement
        var pitch_head_limit = [-0.279, 0.419];
        var roll_head_limit = [-0.105, 0.105];
        var yaw_head_limit = [-0.663,0.663];

        function AngleLimit(value,limit_neck,limit_head)
        {
            output = {};
            output['head'] = 0.0;
            output['neck'] = 0.0;
            _head_perc = 0.5
            _neck_perc = 0.5
            if( value > 0 )
            {
                _limit = limit_neck[1]+limit_head[1]
                _head_perc = limit_head[1]/_limit
                _neck_perc = limit_neck[1]/_limit
                if (value > _limit)
                {
                    value = _limit
                }
            }
            if( value < 0 )
            {
                _limit = limit_neck[0]+limit_head[0]
                _head_perc = limit_head[0]/_limit
                _neck_perc = limit_neck[0]/_limit
                if (value < _limit)
                {
                    value = _limit
                }
            }
            output['neck'] = _neck_perc * value
            output['head'] = _head_perc * value
            return output;
        }



        var delayCreateScene = function () {

            var scene = new BABYLON.Scene(engine);
            //scene.clearColor = new BABYLON.Color3(.5, .5, .5);
            //var advancedTexture = BABYLON.GUI.AdvancedDynamicTexture.CreateFullscreenUI("UI");

            // var skybox = BABYLON.MeshBuilder.CreateBox("SkyBox", {size:100.0}, scene);
            // var skyboxMaterial = new BABYLON.StandardMaterial("skyBox", scene);
            // skyboxMaterial.backFaceCulling = false;
            // skyboxMaterial.reflectionTexture = new BABYLON.HDRCubeTexture("gym_01_1k_blur.hdr", scene, 512);
            // skyboxMaterial.reflectionTexture.coordinatesMode = BABYLON.Texture.SKYBOX_MODE;
            // skybox.material = skyboxMaterial;

            var skeleton;
            var forward = true;
            var rot = new BABYLON.Vector3(0.02,0.52,0.02);
            var helperCamera;
            var camera;
            var count = 0;
            var lastCamera = 0
            var previous_rot = new BABYLON.Vector3(0.02,0.02,0.02);
            var meshReady = false;

            BABYLON.SceneLoader.ImportMesh("", "", "avatar.glb", scene,
                function (meshes, particleSystems, skeletons) {
                    var skeleton = skeletons[0];
                    var meshReady = true;

                    try{
                        window.webkit.messageHandlers.contentReadyMessage.postMessage({
                                "message": meshReady
                        })
                    }
                    catch {

                    }

                    scene.createDefaultCamera(true, true, true);

                    var light = new BABYLON.PointLight("pointLight", new BABYLON.Vector3(10,1.6,0), scene)
                    env =  scene.createDefaultEnvironment();
                    env.setMainColor(new BABYLON.Color3(1.0,0.533,0.533));
                    var light = new BABYLON.HemisphericLight("HemiLight", new BABYLON.Vector3(0, 1, 0), scene);

                    camera_head = new BABYLON.UniversalCamera("UniversalCamera", new BABYLON.Vector3(0, 1.5, -1.0), scene, true);
                    camera_head.setTarget(new BABYLON.Vector3(0,1.6,0));
                    //camera_head.attachControl(canvas,true);
                    camera_head.minZ = -1

                    camera_arms = new BABYLON.UniversalCamera("UniversalCamera", new BABYLON.Vector3(0, 1.5, -2.), scene, true);
                    camera_arms.setTarget(new BABYLON.Vector3(0,1.5,0));
                    camera_arms.minZ = -1
                    //camera_arms.attachControl(canvas,true);

                    scene.activeCamera = camera_head
                    //scene.debugLayer.show();

                    // let skelViewer = new BABYLON.Debug.SkeletonViewer(
                    //     skeleton, scene.getMeshByName('__root__'), scene
                    // );

                    scene.registerBeforeRender(function () {
                        let mesh = scene.getMeshByName('__root__');
                        if (mesh) {
                            mesh.rotationQuaternion = null;
                            try {
                                // RIGHT Shoulder                
                                skeleton.bones[34].getTransformNode().rotation = new BABYLON.Vector3(0.0,0.0,0.0);
                                skeleton.bones[35].getTransformNode().rotation = new BABYLON.Vector3(0.0,0.0,0.0);
                                skeleton.bones[36].getTransformNode().rotation = new BABYLON.Vector3(0.0,0.0,0.0);

                                // LEFT Shoulder
                                skeleton.bones[10].getTransformNode().rotation = new BABYLON.Vector3(0.0,0.0,0.0);
                                skeleton.bones[11].getTransformNode().rotation = new BABYLON.Vector3(0.0,0.0,0.0);
                                skeleton.bones[12].getTransformNode().rotation = new BABYLON.Vector3(0.0,0.0,0.0);

                                //Neck
                                skeleton.bones[4].getTransformNode().rotation = new BABYLON.Vector3(0.0,0.0,0.0);
                                //Head
                                skeleton.bones[5].getTransformNode().rotation = new BABYLON.Vector3(0.0,0.0,0.0);

                                // Upper Back
                                skeleton.bones[1].getTransformNode().rotation = new BABYLON.Vector3(0.0,0.0,0.0);
                                skeleton.bones[2].getTransformNode().rotation = new BABYLON.Vector3(0.0,0.0,0.0);
                                // Lower Back
                                skeleton.bones[3].getTransformNode().rotation = new BABYLON.Vector3(0.0,0.0,0.0);

                                skeleton.bones[0].getTransformNode().rotation = new BABYLON.Vector3(0.0,0.0,0.0);

                                try {
                                    animate_lower_back = true;
                                    values = JSON.parse(rotationValues);
                                    
                                    //Chest
                                    pitch = -values['theta_torso_pitch_r'];
                                    bend = -values['theta_torso_bend_r'];
                                    yaw =  values['theta_torso_yaw_r'];
                                    roll = -values['theta_torso_roll_r']; 
                                    tilt = values['theta_torso_tilt_r']; 
                                    
                                    // Head / neck
                                    head_pitch = AngleLimit(values['theta_head_pitch_h'],pitch_neck_limit,pitch_head_limit); // x
                                    head_yaw = AngleLimit(values['theta_head_yaw_h'],yaw_neck_limit,yaw_head_limit); // y
                                    head_roll = AngleLimit(values['theta_head_roll_h'],roll_neck_limit,roll_head_limit); //z	

                                    //Right Arm
                                    alpha_upper_r = Math.PI/2.2 - values['theta_armright_upper_alpha'];
                                    beta_upper_r =    values['theta_armright_upper_beta'];
                                    gamma_upper_r =   values['theta_armright_upper_gamma'];
                                    alpha_lower_r =  values['theta_armright_lower_alpha'];
                                    beta_lower_r =  -values['theta_armright_lower_beta'];
                                    gamma_lower_r = values['theta_armright_lower_gamma'];
                                    
                                    //Left Arm
                                    alpha_upper_l =  Math.PI/2.2 - values['theta_armleft_upper_alpha'];
                                    beta_upper_l =  -values['theta_armleft_upper_beta'];
                                    gamma_upper_l = values['theta_armleft_upper_gamma'];
                                    alpha_lower_l =  -values['theta_armleft_lower_alpha'];
                                    beta_lower_l =  -values['theta_armleft_lower_beta'];
                                    gamma_lower_l = values['theta_armleft_lower_gamma'];

                                    // Chest
                                    // Lower Back
                                    if (animate_lower_back == true)
                                    {
                                        //yaw = 0.785;
                                        skeleton.bones[0].getTransformNode().rotate(BABYLON.Axis.Y,-yaw );
                                        // skeleton.bones[1].getTransformNode().rotate(BABYLON.Axis.Y,-yaw * 0.5);
                                        skeleton.bones[1].getTransformNode().rotate(BABYLON.Axis.X, -pitch );
                                        skeleton.bones[1].getTransformNode().rotate(BABYLON.Axis.Z, -bend );
                                    }
                                    // Upper Back
                                    skeleton.bones[3].getTransformNode().rotate(BABYLON.Axis.Z, tilt );
                                    // Neck
                                    skeleton.bones[5].getTransformNode().rotate(BABYLON.Axis.X, head_pitch['neck']); //Neck Pitch
                                    skeleton.bones[5].getTransformNode().rotate(BABYLON.Axis.Y, head_yaw['neck']); // Neck Yaw
                                    skeleton.bones[5].getTransformNode().rotate(BABYLON.Axis.Z, head_roll['neck']); // Neck roll

                                    // Head
                                    skeleton.bones[4].getTransformNode().rotate(BABYLON.Axis.X, head_pitch['head']); //Head Pitch
                                    skeleton.bones[4].getTransformNode().rotate(BABYLON.Axis.Y, head_yaw['head']); // Head Yaw
                                    skeleton.bones[4].getTransformNode().rotate(BABYLON.Axis.Z, head_roll['head']); // Head roll


                                    // RIGHT Shoulder
                                    skeleton.bones[34].getTransformNode().rotate(BABYLON.Axis.X, alpha_upper_r); 
                                    skeleton.bones[34].getTransformNode().rotate(BABYLON.Axis.Y, gamma_upper_r);
                                    skeleton.bones[34].getTransformNode().rotate(BABYLON.Axis.Z, beta_upper_r); 

                                    // LEFT Shoulder
                                    skeleton.bones[10].getTransformNode().rotate(BABYLON.Axis.X, alpha_upper_l);
                                    skeleton.bones[10].getTransformNode().rotate(BABYLON.Axis.Y, gamma_upper_l);
                                    skeleton.bones[10].getTransformNode().rotate(BABYLON.Axis.Z, beta_upper_l);
                                    skeleton.bones[11].getTransformNode().rotate(BABYLON.Axis.X, alpha_lower_l);
                                    skeleton.bones[11].getTransformNode().rotate(BABYLON.Axis.Y, gamma_lower_l);
                                    skeleton.bones[11].getTransformNode().rotate(BABYLON.Axis.Z, beta_lower_l);

                                    if (typeof(values['zoom']) != "undefined")
                                    {
                                        if (values['zoom'] == "1") {
                                            if ( scene.activeCamera != camera_arms )
                                            {
                                                scene.activeCamera = camera_arms;
                                            }
                                        }
                                        if (values['zoom'] == "0") {
                                            if ( scene.activeCamera != camera_head )
                                            {
                                                scene.activeCamera = camera_head;
                                            }
                                        }
                                    } else {
                                        scene.activeCamera = camera_head;
                                    }
                                }
                                catch(err) {
                                    console.log(err.message);
                                }

                            } catch(err) {
                                console.log(err.message);
                            }
                        }
                    });
                });
                return scene;
        };

        function fillDetails(jsonData) {
            rotationValues = jsonData
        }

        window.initFunction = async function() {
                var asyncEngineCreation = async function() {
                    try {
                    return createDefaultEngine();
                    } catch(e) {
                    return createDefaultEngine();
                    }
                }

                 window.engine = await asyncEngineCreation();
                if (!engine) throw 'engine should not be null.';
                window.scene = delayCreateScene();
        };

        initFunction().then(() => {
            sceneToRender = scene

            engine.runRenderLoop(function () {
                if (sceneToRender && sceneToRender.activeCamera) {
                    sceneToRender.render();
                }

            });
        });


        // Resize
        window.addEventListener("resize", function () {
            engine.resize();
        });
    </script>
</body>
</html>
